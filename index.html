<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recorte</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  #player-wrap {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #player {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div id="player-wrap">
  <div id="player"></div>
</div>

<script>
  // ID del video de YouTube
  const VIDEO_ID = "lfXd6sLYFWk";

  // Fragmentos seleccionados: [inicio_segundos, fin_segundos]
  // Se reproducen en este orden, uno tras otro.
  const segments = [
    [145, 171],     // 02:25 - 02:51  "el poder de la verdad"
    [386, 458],     // 06:26 - 07:38  quién es Cepeda
    [4439, 4465],   // 01:13:59 - 01:14:25  de la Espriella, abogado de corruptos
    [4089, 4104],   // 01:08:09 - 01:08:24  "el poder de la verdad vs la verdad del poder"
    [4045, 4073],   // 01:07:25 - 01:07:53  "a Sócrates no lo acompañaron"
    [2431, 2458],   // 40:31 - 40:58  política como show mediático, falacias
    [3096, 3131]    // 51:36 - 52:11  Foucault: el poder produce la verdad que conviene
  ];

  let currentSegment = 0;
  let player;
  let checkInterval;

  function loadYouTubeAPI() {
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScript = document.getElementsByTagName('script')[0];
    firstScript.parentNode.insertBefore(tag, firstScript);
  }

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      width: '100%',
      height: '100%',
      videoId: VIDEO_ID,
      playerVars: {
        autoplay: 1,
        controls: 1,
        rel: 0,
        modestbranding: 1,
        playsinline: 1,
        start: segments[0][0],
        fs: 1,
        enablejsapi: 1,
        origin: window.location.origin
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady(event) {
    currentSegment = 0;
    event.target.seekTo(segments[0][0], true);
    event.target.playVideo();
    startWatcher();
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      startWatcher();
    } else if (event.data === YT.PlayerState.PAUSED) {
      stopWatcher();
    }
  }

  function startWatcher() {
    stopWatcher();
    checkInterval = setInterval(() => {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const t = player.getCurrentTime();
      const end = segments[currentSegment][1];
      if (t >= end) {
        goToNextSegment();
      }
    }, 200);
  }

  function stopWatcher() {
    if (checkInterval) {
      clearInterval(checkInterval);
      checkInterval = null;
    }
  }

  function goToNextSegment() {
    currentSegment++;
    if (currentSegment >= segments.length) {
      // Volver a reproducir desde el primer fragmento al terminar
      currentSegment = 0;
    }
    player.seekTo(segments[currentSegment][0], true);
    player.playVideo();
  }

  loadYouTubeAPI();
</script>

</body>
</html>
